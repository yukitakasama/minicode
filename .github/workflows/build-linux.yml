name: Build Linux

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture'
        required: true
        type: choice
        options:
          - x64
          - arm64

jobs:
  build:
    runs-on: ${{ inputs.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Install dependencies (root)
        run: bun install
        working-directory: .

      - name: Install dependencies (desktop)
        run: bun install
        working-directory: desktop

      - name: Build Linux
        run: bash desktop/scripts/build-linux.sh
        env:
          LINUX_ARCH: ${{ inputs.arch }}
          SKIP_PACKAGE_SMOKE: '1'

      - uses: actions/upload-artifact@v4
        with:
          name: minicode-linux-${{ inputs.arch }}
          path: desktop/build-artifacts/linux-${{ inputs.arch }}/
