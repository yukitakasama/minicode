name: Build Linux

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture'
        required: true
        type: choice
        options:
          - x64
          - arm64
      release_tag:
        description: 'Optional GitHub release tag to upload Linux packages to'
        required: false
        type: string

jobs:
  build:
    permissions:
      contents: write
    runs-on: ${{ inputs.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Install dependencies (root)
        run: bun install
        working-directory: .

      - name: Install dependencies (desktop)
        run: bun install
        working-directory: desktop

      - name: Build Linux
        run: bash desktop/scripts/build-linux.sh
        env:
          LINUX_ARCH: ${{ inputs.arch }}
          SKIP_PACKAGE_SMOKE: '1'

      - uses: actions/upload-artifact@v4
        with:
          name: minicode-linux-${{ inputs.arch }}
          path: desktop/build-artifacts/linux-${{ inputs.arch }}/

      - name: Upload Linux packages to release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            desktop/build-artifacts/linux-${{ inputs.arch }}/*.deb \
            desktop/build-artifacts/linux-${{ inputs.arch }}/*.AppImage \
            desktop/build-artifacts/linux-${{ inputs.arch }}/latest-linux*.yml \
            --clobber
